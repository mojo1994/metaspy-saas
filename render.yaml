services:
  - type: web
    name: metaspy-server
    env: node
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    workingDirectory: ./
    envVars:
      - key: NODE_ENV
        value: production
      # ATENCAO: Defina APIFY_TOKEN no dashboard do Render!
      # Pegue o token em apify.txt (nao commitado)
